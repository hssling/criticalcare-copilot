model:
  base: google/gemma-4-26b-a4b-it
  dtype: bfloat16
  quantization:
    enabled: true
    bits: 4
    type: nf4
    double_quant: true
  attn_implementation: sdpa

tokenizer:
  pad_to_multiple_of: 8
  model_max_length: 4096
  add_eos_token: true

lora:
  r: 32
  alpha: 64
  dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

data:
  train_path: data/processed/train.jsonl
  valid_path: data/processed/valid.jsonl
  test_path:  data/processed/test.jsonl
  prompt_template: training/prompts/system_prompt.txt
  safety_prompt:   training/prompts/safety_prompt.txt
  max_seq_len: 4096
  pack: false

training:
  output_dir: checkpoints/gemma4_26b_a4b_lora
  per_device_train_batch_size: 1
  per_device_eval_batch_size:  1
  gradient_accumulation_steps: 32
  learning_rate: 1.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  num_train_epochs: 1
  logging_steps: 20
  save_steps: 200
  eval_steps: 200
  save_total_limit: 2
  bf16: true
  gradient_checkpointing: true
  optim: paged_adamw_8bit
  seed: 1337
  report_to: []
