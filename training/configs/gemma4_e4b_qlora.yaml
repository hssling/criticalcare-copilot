model:
  base: google/gemma-4-e4b-it
  dtype: bfloat16
  quantization:
    enabled: true
    bits: 4
    type: nf4
    double_quant: true
  attn_implementation: sdpa

tokenizer:
  pad_to_multiple_of: 8
  model_max_length: 2048
  add_eos_token: true

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

data:
  train_path: data/processed/train.jsonl
  valid_path: data/processed/valid.jsonl
  test_path:  data/processed/test.jsonl
  prompt_template: training/prompts/system_prompt.txt
  safety_prompt:   training/prompts/safety_prompt.txt
  max_seq_len: 2048
  pack: false

training:
  output_dir: checkpoints/gemma4_e4b_qlora
  per_device_train_batch_size: 1
  per_device_eval_batch_size:  1
  gradient_accumulation_steps: 16
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  num_train_epochs: 2
  logging_steps: 20
  save_steps: 200
  eval_steps: 200
  save_total_limit: 3
  bf16: true
  gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: false
  optim: paged_adamw_8bit
  weight_decay: 0.0
  max_grad_norm: 1.0
  early_stopping_patience: 3
  seed: 1337
  report_to: []
  ddp_find_unused_parameters: false

eval:
  compute_schema_valid_rate: true
  compute_abstention_correctness: true
