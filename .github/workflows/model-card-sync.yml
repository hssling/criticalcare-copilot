name: model-card-sync

on:
  workflow_run:
    workflows: ["eval"]
    types: [completed]
  workflow_dispatch:

jobs:
  render:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install pyyaml huggingface_hub
      - name: Render model card
        run: |
          python hf/generate_model_card.py > docs/MODEL_CARD.rendered.md
      - name: Commit rendered card
        run: |
          if git diff --quiet; then
            echo "no changes"; exit 0
          fi
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add docs/MODEL_CARD.rendered.md
          git commit -m "docs: refresh rendered model card"
          git push
